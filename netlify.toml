[[redirects]]
  from = "/steam-api/*"
  to = "https://api.steampowered.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/steam-usercontent/*"
  to = "https://*.steamusercontent.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/bga-proxy/*"
  to = "https://boardgamearena.com/:splat"
  status = 200
  force = true
